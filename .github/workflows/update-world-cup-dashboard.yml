name: Update World Cup Dashboard

on:
  schedule:
    # Every 15 minutes (UTC). GitHub may delay scheduled runs by a few minutes.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dashboard
        shell: pwsh
        run: & "./World Cup/build-github-pages.ps1"

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No score changes to publish."
          else
            git commit -m "Update World Cup dashboard scores"
            git push
          fi
