name: Update World Cup Dashboard

# The 2026 World Cup is complete (Spain champions, July 2026).
# Scheduled auto-updates are disabled. Use workflow_dispatch only if you
# intentionally need a manual refresh.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update dashboard scores and build docs
        run: python3 "World Cup/update_dashboard_ci.py"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Update World Cup dashboard scores"
            git push
            echo "Published updated scores to docs/."
          fi
