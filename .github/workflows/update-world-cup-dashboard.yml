name: Update World Cup Dashboard

on:
  schedule:
    # Every 15 minutes (UTC). GitHub may delay scheduled runs by a few minutes.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    env:
      GITHUB_ACTIONS: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dashboard
        shell: pwsh
        run: |
          try {
            ./World Cup/build-github-pages.ps1
          } catch {
            Write-Error $_
            exit 1
          }

      - name: Commit and push if changed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update World Cup dashboard scores"
            git push
            Write-Host "Published updated scores to docs/."
          } else {
            Write-Host "No changes to publish."
          }
